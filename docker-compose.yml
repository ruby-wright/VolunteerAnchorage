version: "3.9"

services:
  volunteer_db:
    image: postgres:16
    container_name: volunteer_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: volunteer_app
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
      - ./database/schema.sql:/docker-entrypoint-initdb.d/schema.sql

  backend:
    build: ./backend
    container_name: volunteer_backend
    command: node server.js
    volumes:
      - ./backend:/usr/src/app
    ports:
      - "5000:5000"
    environment:
      DB_HOST: volunteer_db
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: volunteer_app
      JWT_SECRET: supersecretkey
    depends_on:
      - volunteer_db

volumes:
  db_data:
